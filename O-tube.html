<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>しあtube</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; }
  header { background: #0f0f0f; padding: 12px 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #272727; position: sticky; top: 0; z-index: 10; }
  .logo { font-size: 20px; font-weight: 700; white-space: nowrap; }
  .logo span { color: #ff4444; }
  .search-wrap { display: flex; gap: 8px; flex: 1; }
  .search-wrap input { flex: 1; height: 36px; background: #272727; border: 1px solid #383838; border-radius: 20px; color: #fff; padding: 0 16px; font-size: 14px; font-family: inherit; outline: none; min-width: 0; }
  .search-wrap input::placeholder { color: #666; }
  .search-wrap input:focus { border-color: #666; }
  .search-wrap button { height: 36px; padding: 0 18px; border-radius: 20px; border: none; background: #ff4444; color: #fff; font-size: 14px; font-family: inherit; font-weight: 500; cursor: pointer; white-space: nowrap; }
  .search-wrap button:hover { background: #e03030; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 16px; padding: 20px 16px; }
  .card { cursor: pointer; border-radius: 10px; overflow: hidden; background: #1a1a1a; transition: transform 0.15s, box-shadow 0.15s; position: relative; }
  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
  .thumb { position: relative; width: 100%; aspect-ratio: 16/9; background: #111; overflow: hidden; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.2s; }
  .card:hover .thumb img { transform: scale(1.04); }
  .play-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.3); display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.15s; }
  .card:hover .play-overlay { opacity: 1; }
  .play-icon { width: 50px; height: 50px; background: rgba(255,255,255,0.92); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .play-icon svg { width: 22px; height: 22px; fill: #111; margin-left: 4px; }
  .card-info { padding: 10px 12px 12px; }
  .card-title { font-size: 13px; font-weight: 500; color: #eee; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
  .card-ch { font-size: 12px; color: #888; }
  .status { text-align: center; padding: 60px 20px; color: #555; font-size: 14px; line-height: 2; }
  .status svg { width: 48px; height: 48px; fill: #333; display: block; margin: 0 auto 12px; }
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 100; align-items: center; justify-content: center; flex-direction: column; }
  .modal.active { display: flex; }
  .modal-inner { width: min(94vw, 800px); }
  .modal-inner iframe { width: 100%; aspect-ratio: 16/9; border: none; border-radius: 10px; display: block; background: #000; }
  .modal-title { margin-top: 10px; font-size: 13px; color: #bbb; text-align: center; padding: 0 12px; }
  .modal-close { margin-top: 14px; padding: 8px 28px; border-radius: 20px; border: 1px solid #444; background: transparent; color: #aaa; font-size: 13px; font-family: inherit; cursor: pointer; display: block; margin-left: auto; margin-right: auto; }
  .modal-close:hover { border-color: #888; color: #fff; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 28px; height: 28px; border: 2px solid #333; border-top-color: #ff4444; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 60px auto; }
  @media (max-width: 480px) { .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; padding: 12px; } }
</style>
</head>
<body>

<header>
  <div class="logo">しあ<span>tube</span></div>
  <div class="search-wrap">
    <input id="q" type="text" placeholder="動画を検索..." />
    <button onclick="search()">検索</button>
  </div>
</header>

<div id="grid" class="grid"></div>
<div id="status" class="status">
  <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zM8 15l8-4.5L8 6v9z"/></svg>
  キーワードを入力して検索してみよう
</div>

<div class="modal" id="modal">
  <div class="modal-inner">
    <iframe id="player" src="" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>
    <div class="modal-title" id="modal-title"></div>
    <button class="modal-close" onclick="closeModal()">✕ 閉じる</button>
  </div>
</div>

<script>
// ↓↓↓ ここにAPIキーを貼り付けてください ↓↓↓
const API_KEY = 'ここにAPIキーを貼り付け';
// ↑↑↑ ここにAPIキーを貼り付けてください ↑↑↑

async function search() {
  const q = document.getElementById('q').value.trim();
  if (!q) return;
  const grid = document.getElementById('grid');
  const status = document.getElementById('status');
  grid.innerHTML = '';
  status.innerHTML = '<div class="spinner"></div>';
  status.style.display = 'block';

  try {
    const res = await fetch(
      'https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=20&q=' +
      encodeURIComponent(q) + '&key=' + API_KEY
    );
    const data = await res.json();
    if (!data.items || data.items.length === 0) {
      status.innerHTML = '結果が見つかりませんでした';
      return;
    }
    status.style.display = 'none';
    data.items.forEach(item => {
      const id = item.id.videoId;
      const title = item.snippet.title;
      const channel = item.snippet.channelTitle;
      const thumb = item.snippet.thumbnails.medium.url;
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML =
        '<div class="thumb">' +
          '<img src="' + thumb + '" alt="' + title + '" loading="lazy" />' +
          '<div class="play-overlay"><div class="play-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>' +
        '</div>' +
        '<div class="card-info">' +
          '<div class="card-title">' + title + '</div>' +
          '<div class="card-ch">' + channel + '</div>' +
        '</div>';
      card.onclick = () => openPlayer(id, title);
      grid.appendChild(card);
    });
  } catch(e) {
    status.innerHTML = 'エラーが発生しました。APIキーを確認してください。';
  }
}

function openPlayer(id, title) {
  document.getElementById('player').src = 'https://www.youtube.com/embed/' + id + '?autoplay=1';
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  document.getElementById('player').src = '';
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.getElementById('q').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') search();
});
</script>
</body>
</html>
