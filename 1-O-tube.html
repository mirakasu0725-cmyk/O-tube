<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Oこへtube</title>

<style>

  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body { font-family: 'Noto Sans JP', sans-serif; background: #0f0f0f; color: #fff; min-height: 100vh; }



  header {

    background: #0f0f0f;

    padding: 12px 16px;

    display: flex;

    align-items: center;

    gap: 10px;

    border-bottom: 1px solid #272727;

    position: sticky;

    top: 0;

    z-index: 10;

  }

  .logo { font-size: 18px; font-weight: 700; white-space: nowrap; }

  .logo span { color: #ff4444; }



  .search-wrap { display: flex; flex: 1; gap: 6px; }

  .search-wrap input {

    flex: 1;

    height: 36px;

    background: #222;

    border: 1px solid #444;

    border-radius: 18px;

    color: #fff;

    padding: 0 16px;

    font-size: 14px;

    font-family: inherit;

    outline: none;

    min-width: 0;

  }

  .search-wrap input::placeholder { color: #666; }

  .search-wrap input:focus { border-color: #888; }

  .search-wrap button {

    height: 36px;

    padding: 0 16px;

    border-radius: 18px;

    border: none;

    background: #ff4444;

    color: #fff;

    font-size: 14px;

    font-family: inherit;

    font-weight: 500;

    cursor: pointer;

    white-space: nowrap;

  }

  .search-wrap button:hover { background: #cc3333; }



  .grid {

    display: grid;

    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));

    gap: 16px;

    padding: 20px 16px;

  }



  .card {

    border-radius: 10px;

    overflow: hidden;

    background: #1a1a1a;

    cursor: pointer;

    transition: transform 0.15s, box-shadow 0.15s;

    position: relative;

  }

  .card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.6); }



  .thumb { position: relative; width: 100%; aspect-ratio: 16/9; background: #111; overflow: hidden; }

  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.2s; }

  .card:hover .thumb img { transform: scale(1.04); }



  .play-overlay {

    position: absolute; inset: 0;

    background: rgba(0,0,0,0.3);

    display: flex; align-items: center; justify-content: center;

    opacity: 0; transition: opacity 0.15s;

  }

  .card:hover .play-overlay { opacity: 1; }

  .play-circle {

    width: 48px; height: 48px;

    background: rgba(255,255,255,0.92);

    border-radius: 50%;

    display: flex; align-items: center; justify-content: center;

  }

  .play-circle svg { width: 22px; height: 22px; fill: #111; margin-left: 3px; }



  .card-info { padding: 10px 12px 12px; }

  .card-title {

    font-size: 13px; font-weight: 500; color: #eee;

    line-height: 1.4;

    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;

    margin-bottom: 4px;

  }

  .card-ch { font-size: 12px; color: #888; }



  .status {

    text-align: center;

    padding: 60px 20px;

    color: #555;

    font-size: 14px;

    line-height: 1.8;

  }

  .status svg { width: 48px; height: 48px; fill: #333; margin-bottom: 12px; display: block; margin-left: auto; margin-right: auto; }



  @keyframes spin { to { transform: rotate(360deg); } }

  .spinner {

    width: 28px; height: 28px;

    border: 2px solid #333;

    border-top-color: #ff4444;

    border-radius: 50%;

    animation: spin 0.7s linear infinite;

    margin: 60px auto;

  }



  /* モーダル */

  .modal {

    display: none;

    position: fixed; inset: 0;

    background: rgba(0,0,0,0.92);

    z-index: 100;

    align-items: center; justify-content: center; flex-direction: column;

  }

  .modal.active { display: flex; }

  .modal-inner { width: min(94vw, 800px); }

  .modal-inner iframe {

    width: 100%; aspect-ratio: 16/9;

    border: none; border-radius: 10px;

    display: block; background: #000;

  }

  .modal-title { margin-top: 12px; font-size: 13px; color: #bbb; text-align: center; line-height: 1.4; }

  .modal-close {

    margin-top: 14px;

    padding: 8px 28px;

    border-radius: 20px;

    border: 1px solid #555;

    background: transparent;

    color: #aaa;

    font-size: 13px;

    font-family: inherit;

    cursor: pointer;

  }

  .modal-close:hover { border-color: #aaa; color: #fff; }



  @media (max-width: 480px) {

    .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; padding: 12px; }

  }

</style>

</head>

<body>



<header>

  <div class="logo">Oこへ<span>tube</span></div>

  <div class="search-wrap">

    <input id="q" type="text" placeholder="動画を検索..." />

    <button onclick="search()">検索</button>

  </div>

</header>



<div id="content">

  <div class="status">

    <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H3V5h18v14zM8 15l8-4.5L8 6v9z"/></svg>

    キーワードを入力して検索してみよう

  </div>

</div>



<div class="modal" id="modal">

  <div class="modal-inner">

    <iframe id="player" src="" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>

    <div class="modal-title" id="modal-title"></div>

    <button class="modal-close" onclick="closeModal()">✕ 閉じる</button>

  </div>

</div>



<script>

// ★ここにAPIキーを貼り付けてください★

const API_KEY = 'AIzaSyAPIU08y9Lsv_OQDVfelsYNhIZ2NiBmY44';



async function search() {

  const q = document.getElementById('q').value.trim();

  if (!q) return;



  const content = document.getElementById('content');

  content.innerHTML = '<div class="spinner"></div>';



  try {

    const res = await fetch(

      `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=20&q=${encodeURIComponent(q)}&key=${API_KEY}`

    );

    const data = await res.json();



    if (data.error) {

      content.innerHTML = `<div class="status">エラー: ${data.error.message}</div>`;

      return;

    }



    if (!data.items || data.items.length === 0) {

      content.innerHTML = '<div class="status">動画が見つかりませんでした</div>';

      return;

    }



    const grid = document.createElement('div');

    grid.className = 'grid';



    data.items.forEach(item => {

      const id = item.id.videoId;

      const title = item.snippet.title;

      const channel = item.snippet.channelTitle;

      const thumb = item.snippet.thumbnails.medium?.url || item.snippet.thumbnails.default?.url;



      const card = document.createElement('div');

      card.className = 'card';

      card.innerHTML = `

        <div class="thumb">

          <img src="${thumb}" alt="${title}" loading="lazy" />

          <div class="play-overlay">

            <div class="play-circle">

              <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>

            </div>

          </div>

        </div>

        <div class="card-info">

          <div class="card-title">${title}</div>

          <div class="card-ch">${channel}</div>

        </div>`;

      card.onclick = () => openModal(id, title);

      grid.appendChild(card);

    });



    content.innerHTML = '';

    content.appendChild(grid);

  } catch (e) {

    content.innerHTML = '<div class="status">通信エラーが発生しました。再度お試しください。</div>';

  }

}



function openModal(id, title) {

  document.getElementById('player').src = `https://www.youtube.com/embed/${id}?autoplay=1`;

  document.getElementById('modal-title').textContent = title;

  document.getElementById('modal').classList.add('active');

}



function closeModal() {

  document.getElementById('modal').classList.remove('active');

  document.getElementById('player').src = '';

}



document.getElementById('modal').addEventListener('click', e => {

  if (e.target === document.getElementById('modal')) closeModal();

});



document.getElementById('q').addEventListener('keydown', e => {

  if (e.key === 'Enter') search();

});

</script>

</body>

</html>
